services:
  - type: web
    name: team31-project3-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PSQL_HOST
        sync: false
      - key: PSQL_USER
        sync: false
      - key: PSQL_DATABASE
        sync: false
      - key: PSQL_PASSWORD
        sync: false
      - key: PSQL_PORT
        value: 5432
      - key: PSQL_SSL_MODE
        value: require

  - type: static
    name: team31-project3-web
    rootDir: .
    buildCommand: npm ci && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
